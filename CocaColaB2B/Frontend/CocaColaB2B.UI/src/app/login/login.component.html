<div class="login-container">
  <div class="login-wrapper glass-panel">
    
    <div class="brand-header">
      <div class="logo-circle">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" class="brand-icon">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="currentColor"/>
          <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1>Coca-Cola B2B</h1>
      <p>Enterprise Inventory Management</p>
    </div>

    <!-- Tab Switcher -->
    <div class="tab-switcher">
      <button [class.active]="!isRegisterMode" (click)="toggleMode()" *ngIf="isRegisterMode">Sign In</button>
      <button [class.active]="isRegisterMode" (click)="toggleMode()" *ngIf="!isRegisterMode">Create Account</button>
    </div>

    <div *ngIf="error" class="error-banner">
      {{ error }}
    </div>

    <div *ngIf="successMessage" class="success-banner">
      {{ successMessage }}
    </div>

    <!-- Login Form -->
    <form *ngIf="!isRegisterMode" class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-input" formControlName="email" placeholder="admin@cocacola.com" />
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" formControlName="password" placeholder="••••••••" />
      </div>

      <div class="forgot-password">
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit" class="btn-primary full-width" [disabled]="isLoading">
        {{ isLoading ? 'Authenticating...' : 'Sign In to Portal' }}
      </button>
    </form>

    <!-- Register Form -->
    <form *ngIf="isRegisterMode" class="login-form" [formGroup]="registerForm" (ngSubmit)="onRegister()">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-input" formControlName="fullName" placeholder="John Doe" />
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-input" formControlName="email" placeholder="john@company.com" />
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" formControlName="password" placeholder="Min. 6 characters" />
      </div>

      <div class="form-group">
        <label class="form-label">Contact Number</label>
        <input type="text" class="form-input" formControlName="contactNumber" placeholder="+91 9876543210" />
      </div>

      <div class="form-group">
        <label class="form-label">Business Address</label>
        <input type="text" class="form-input" formControlName="address" placeholder="Your business address" />
      </div>

      <button type="submit" class="btn-primary full-width" [disabled]="isLoading">
        {{ isLoading ? 'Creating Account...' : 'Register as Wholesaler' }}
      </button>
    </form>

    <div class="toggle-text">
      <span *ngIf="!isRegisterMode">New here? <a (click)="toggleMode()">Create a Wholesaler Account</a></span>
      <span *ngIf="isRegisterMode">Already have an account? <a (click)="toggleMode()">Sign In</a></span>
    </div>
    
    <div class="system-status">
      <span class="status-dot"></span> Secure Connection Active
    </div>
  </div>
</div>
